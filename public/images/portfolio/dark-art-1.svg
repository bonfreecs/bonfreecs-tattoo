<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d132c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <circle cx="400" cy="250" r="100" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <circle cx="400" cy="250" r="80" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.3"/>
  
  <text x="400" y="260" font-family="Orbitron, sans-serif" font-size="48" font-weight="900" 
        fill="#00f0ff" text-anchor="middle" filter="url(#glow)">BONFREECS</text>
  <text x="400" y="310" font-family="Rajdhani, sans-serif" font-size="24" 
        fill="#ff00ff" text-anchor="middle" opacity="0.8">DARK ART TATTOO</text>
  
  <text x="400" y="450" font-family="Orbitron, sans-serif" font-size="36" 
        fill="#888888" text-anchor="middle">DEMONIC PORTRAIT</text>
  <text x="400" y="490" font-family="Rajdhani, sans-serif" font-size="18" 
        fill="#00f0ff" text-anchor="middle" opacity="0.6">Dark Art • 2025</text>
  
  <path d="M 200 550 L 600 550" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
</svg>
