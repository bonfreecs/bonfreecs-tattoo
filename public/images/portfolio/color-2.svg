<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <path d="M 200 400 Q 400 100 600 400" fill="none" stroke="#ff6600" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <path d="M 250 400 Q 400 150 550 400" fill="none" stroke="#ff0066" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="300" r="60" fill="#ff9900" opacity="0.3" filter="url(#glow)"/>
  <path d="M 400 240 L 430 290 L 400 270 L 370 290 Z" fill="#ff0066" opacity="0.8"/>
  
  <text x="400" y="420" font-family="Orbitron, sans-serif" font-size="34" 
        fill="#888888" text-anchor="middle">WATERCOLOR PHOENIX</text>
  <text x="400" y="460" font-family="Rajdhani, sans-serif" font-size="18" 
        fill="#00f0ff" text-anchor="middle" opacity="0.6">Color • 2025</text>
</svg>
