<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <rect x="250" y="150" width="300" height="200" fill="none" stroke="#00f0ff" stroke-width="3" opacity="0.5"/>
  <circle cx="400" cy="250" r="80" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.4"/>
  <line x1="320" y1="250" x2="480" y2="250" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="170" x2="400" y2="330" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
  
  <text x="400" y="420" font-family="Orbitron, sans-serif" font-size="32" 
        fill="#888888" text-anchor="middle">AMERICAN TRADITIONAL</text>
  <text x="400" y="460" font-family="Rajdhani, sans-serif" font-size="18" 
        fill="#00f0ff" text-anchor="middle" opacity="0.6">Traditional • 2024</text>
</svg>
