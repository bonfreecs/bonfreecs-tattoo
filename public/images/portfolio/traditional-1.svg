<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <rect x="200" y="150" width="400" height="300" fill="none" stroke="#00f0ff" stroke-width="2" 
        opacity="0.4" filter="url(#glow)" rx="20"/>
  <line x1="200" y1="150" x2="600" y2="450" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="150" x2="200" y2="450" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>
  
  <text x="400" y="280" font-family="Orbitron, sans-serif" font-size="42" font-weight="900" 
        fill="#00f0ff" text-anchor="middle" filter="url(#glow)">JAPANESE</text>
  <text x="400" y="330" font-family="Orbitron, sans-serif" font-size="42" font-weight="900" 
        fill="#ff00ff" text-anchor="middle">DRAGON</text>
  
  <text x="400" y="450" font-family="Orbitron, sans-serif" font-size="36" 
        fill="#888888" text-anchor="middle">JAPANESE KOI</text>
  <text x="400" y="490" font-family="Rajdhani, sans-serif" font-size="18" 
        fill="#00f0ff" text-anchor="middle" opacity="0.6">Traditional • 2025</text>
</svg>
