<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d132c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <circle cx="400" cy="250" r="120" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.4"/>
  <path d="M 400 130 L 440 200 L 400 170 L 360 200 Z" fill="#ff00ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="400" cy="250" r="40" fill="#00f0ff" opacity="0.3"/>
  
  <text x="400" y="420" font-family="Orbitron, sans-serif" font-size="36" 
        fill="#888888" text-anchor="middle">SKULL MANDALA</text>
  <text x="400" y="460" font-family="Rajdhani, sans-serif" font-size="18" 
        fill="#00f0ff" text-anchor="middle" opacity="0.6">Dark Art • 2024</text>
</svg>
